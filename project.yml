name: 時間割アルファ
options:
  bundleIdPrefix: com.sugawaraichirou
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_PREVIEWS: "YES"

targets:
  時間割アルファ:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: 時間割アルファ/Info.plist
      properties:
        CFBundleName: 時間割アルファ
        CFBundleDisplayName: 時間割アルファ
        CFBundleIdentifier: com.sugawaraichirou.jikanwari-alpha
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        NSPhotoLibraryUsageDescription: 授業メモや時間割のOCR読み取りに写真ライブラリを使用します
        NSPhotoLibraryAddUsageDescription: 時間割の画像を保存するために写真ライブラリを使用します
        NSCameraUsageDescription: 時間割の撮影やOCR読み取りにカメラを使用します
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sugawaraichirou.jikanwari-alpha
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: 時間割アルファ/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    sources:
      - path: 時間割アルファ
        excludes:
          - "*.plist"
    resources:
      - path: 時間割アルファ/Resources/Assets.xcassets
    dependencies:
      - sdk: SwiftData.framework
      - sdk: PDFKit.framework
      - sdk: WebKit.framework
      - sdk: Vision.framework
      - sdk: PhotosUI.framework
      - sdk: UserNotifications.framework
      - sdk: AVFoundation.framework
